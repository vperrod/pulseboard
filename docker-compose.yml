services:
  pulseboard:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/pulseboard.db
      - PULSEBOARD_SCANNER_KEY=${PULSEBOARD_SCANNER_KEY:-dev-scanner-key}
      # BLE disabled in container — use Android scanner or push API
      # - BLE_ENABLED=false
