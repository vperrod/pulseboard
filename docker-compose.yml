services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/pulseboard.db
    # BLE access requires host network on Linux; on macOS/Windows the
    # scanner should run outside Docker (BLE passthrough is limited).
    # Uncomment below for Linux with BLE:
    # network_mode: host
    # privileged: true

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
