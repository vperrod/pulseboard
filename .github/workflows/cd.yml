name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check backend/

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry pulseboardacr \
            --image pulseboard:latest \
            --no-logs \
            .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name pulseboard-app \
            --resource-group pulseboard-rg \
            --image pulseboardacr.azurecr.io/pulseboard:latest
